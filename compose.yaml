services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    container_name: lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx6G
    volumes:
      - ./lavalink/application.yaml:/opt/Lavalink/application.yml
      - ./lavalink/plugins/:/opt/Lavalink/plugins/
      - ./logs:/opt/Lavalink/logs
    networks:
      - lavalink
    ports:
      - "2333:2333"
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - lavalink
    depends_on:
      - lavalink
networks:
  lavalink:
    name: lavalink
